{%extends 'base/base.html'%}
{%block main%}
<main class="container relative">
    <!-- Breadcrumb -->
    <nav class="flex mt-8" aria-label="Breadcrumb">
        <ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse">
            <li class="inline-flex items-center">
                <a href="{%url 'products:index'%}"
                    class="inline-flex items-center text-sm gap-x-1  text-gray-700 hover:text-blue-600 dark:text-gray-400 dark:hover:text-white">
                    <svg class="w-4 h-4 mb-0.5">
                        <use href="#home" />
                    </svg>
                    صفحه اصلی
                </a>
            </li>
            <li aria-current="page">
                <div class="flex items-center">
                    <svg class="rotate-180 w-3 h-3 text-gray-400 mx-1" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 6 10">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m1 9 4-4-4-4" />
                    </svg>
                    <span class="ms-1 text-sm  text-gray-500 md:ms-2 dark:text-gray-400">تماس با ما</span>
                </div>
            </li>
        </ol>
    </nav>
    <section class="relative flex items-center justify-center w-full">
        <!-- background -->
        <div class="pointer-events-none absolute inset-0 flex w-full items-start justify-center overflow-hidden 
    [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_0%,rgba(255,255,255,0)_85%)]">

            <svg
                class="absolute left-0 top-0 h-full w-full stroke-black/10 stroke-[2] 
        [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_20%,rgba(255,255,255,0)_95%)] dark:stroke-white/10">
                <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern)"></rect>
                <defs>
                    <pattern id="grid-pattern" viewBox="0 0 64 64" width="60" height="60" patternUnits="userSpaceOnUse">
                        <path d="M64 0H0V64" fill="none"></path>
                    </pattern>
                </defs>
            </svg>
        </div>

        <div
            class="relative w-[45rem]  mx-5 my-10 flex flex-col justify-center pt-12 pb-5 px-4 md:px-8 bg-white dark:bg-gray-800 shadow-md rounded-xl">
            <div class="sm:mx-auto sm:w-full">
                <p class=" text-gray-800 dark:text-gray-100 font-DanaDemiBold text-lg">تماس با ما</p>
                <p class="text-gray-700 dark:text-gray-200 font-Dana mt-2 mb-8">
                    قبل از مطرح کردن هر گونه سوال بخش <a class="text-blue-500"
                        href="{%url 'products:frequent_questions'%}">سوالات متداول</a>
                    را مطالعه نمایید
                </p>
                <form class="space-y-5" id="question-form" method="POST">
                    <div class="grid grid-cols-12 gap-6">
                        <div class="col-span-6">
                            <input oninput="this.value=this.value.replace(/[^0-9]/g,'')" type="text" name="phone" placeholder="شماره موبایل"
                                class="block w-full p-3 outline dark:outline-none outline-1 -outline-offset-1 placeholder:text-gray-400 transition-all col-span-6
                        text-gray-800 dark:text-gray-100 dark:bg-gray-900 bg-slate-100 border border-transparent hover:border-slate-200 appearance-none rounded-md outline-none focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-blue-400">
                            <div class="text-error active"></div>
                        </div>
                        <div class="col-span-6">
                            <input type="text" placeholder="عنوان"
                                class="block w-full p-3 outline dark:outline-none outline-1 -outline-offset-1 placeholder:text-gray-400 transition-all col-span-6
                        text-gray-800 dark:text-gray-100 dark:bg-gray-900 bg-slate-100 border border-transparent hover:border-slate-200 appearance-none rounded-md outline-none focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-blue-400">
                            <div class="text-error active"></div>
                        </div>
                        <div class="col-span-12">
                            <textarea placeholder="متن دیدگاه"
                                class="w-full h-24 p-3 outline dark:outline-none outline-1 -outline-offset-1 placeholder:text-gray-400 transition-all 
                        text-gray-800 dark:text-gray-100 dark:bg-gray-900 bg-slate-100 border border-transparent hover:border-slate-200 appearance-none rounded-md outline-none focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 dark:focus:ring-blue-400"></textarea>
                            <div class="text-error active"></div>
                        </div>
                    </div>
                    <div>
                        <button class="submit-btn">ارسال پیام</button>
                    </div>
                </form>
                <div
                    class="mt-10 flex items-center justify-center gap-x-8 flex-wrap text-gray-500 dark:text-gray-400 child:flex child:items-center child:justify-center child:gap-x-1">

                    <div>
                        <p>ParasikShop</p>
                        <svg class="size-5 mb-1">
                            <use href="#envelope"></use>
                        </svg>
                    </div>

                </div>
            </div>
        </div>
    </section>
</main>
{%endblock%}
{%block scripts%}
<script>
    document.querySelector("#question-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const phoneRegex = /^09\d{9}$/;
        let validData = true
        e.currentTarget.querySelectorAll("input, textarea").forEach(function (ele) {
            let entry = ele.value
            let error = ele.nextElementSibling
            console.log(entry, error)
            if (!entry) {
                error.innerText = "مقدار این فیلد اجباری است"
                validData = false
            } else {
                error.innerText = ""
                if (ele.name === "phone") {
                    let isValidPhone = phoneRegex.test(entry)
                    if (!isValidPhone) {
                        error.innerText = "لطفا یک مقدار معتبر برای شماره تلفن وارد کنید!"
                        validData=false
                    }
                }
            }
        });
        if (validData) {
            fireAlert(text = "درخواست شما ثبت و نتیجه از طریق پیامک اعلام میگردد", icon = "success", title = "ثبت شد!")
        }
    })
</script>
{%endblock%}
