components:
  schemas:
    Category:
      type: object
      properties:
        slug:
          type: string
          title: اسلاگ
          pattern: ^[-\w]+$
          maxLength: 50
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          readOnly: true
      required:
      - products
      - slug
    File:
      type: object
      properties:
        image:
          type: string
          format: uri
          title: تصویر
        title:
          type: string
          title: عنوان
          maxLength: 50
      required:
      - image
      - title
    Item:
      type: object
      properties:
        price:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: قیمت
        weight:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: وزن
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: تعداد
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
      required:
      - price
      - product
      - quantity
      - weight
    Order:
      type: object
      properties:
        fname:
          type: string
          title: نام
          maxLength: 20
        lname:
          type: string
          title: نام خانوادگی
          maxLength: 20
        phone:
          type: string
          title: شماره تلفن
          pattern: ^(\+98|0)?9\d{9}$
          maxLength: 11
        postal_code:
          type: string
          title: کد پستی
          pattern: ^\d{10}$
          maxLength: 10
        des:
          type: string
          nullable: true
          title: توضیحات
          maxLength: 100
        date_created:
          type: string
          format: date-time
          readOnly: true
          title: تاریخ سفارش
        date_updated:
          type: string
          format: date-time
          readOnly: true
          title: اخرین بروزرسانی
        is_rejected:
          type: boolean
          title: مرجوعی
        is_paid:
          type: boolean
          title: پرداخت شده
        post_type:
          allOf:
          - $ref: '#/components/schemas/PostTypeEnum'
          title: نوع پست
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          readOnly: true
      required:
      - date_created
      - date_updated
      - fname
      - items
      - lname
      - phone
      - postal_code
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedProductList:
      type: object
      required:
      - results
      properties:
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cD00ODY%3D"
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
        results:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    PatchedCategory:
      type: object
      properties:
        slug:
          type: string
          title: اسلاگ
          pattern: ^[-\w]+$
          maxLength: 50
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
          readOnly: true
    PostTypeEnum:
      enum:
      - PSH
      - MN
      type: string
      description: |-
        * `PSH` - پیشتاز
        * `MN` - معمولی
    Product:
      type: object
      properties:
        name:
          type: string
          title: نام
          maxLength: 30
        price:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: قیمت
        price_after_off:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          title: قیمت پس از تخفیف
        'off':
          type: integer
          maximum: 2147483647
          minimum: 0
          title: تخفیف
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          readOnly: true
      required:
      - files
      - name
      - 'off'
      - price
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
