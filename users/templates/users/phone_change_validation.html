{%load static%}
<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> احراز کد تایید تغییر شماره</title>
  <link rel="stylesheet" href="{%static 'css/app.css'%}">
  <link rel="stylesheet" href="../node_modules/swiper/swiper-bundle.css">
  <!-- ==========================  DARK MODE SCRIPT ============================= -->
  <script type="text/javascript">
    if (
      localStorage.theme === "dark" ||
      (!("theme" in localStorage) &&
        window.matchMedia("(prefers-color-scheme: dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    } else {
      document.documentElement.classList.remove("dark");
    }
  </script>
</head>

<body>
  <!-- ALL ICONS -->
  <svg class="hidden">
    <symbol id="moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
      <path fill-rule="evenodd"
        d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"
        clip-rule="evenodd" />
    </symbol>
    <symbol id="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
      <path
        d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z" />
    </symbol>
    <symbol id="chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
      stroke="currentColor" class="size-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </symbol>

  </svg>

  <section class="relative flex items-center justify-center min-h-screen w-full">
    <!-- background -->
    <div class="pointer-events-none absolute inset-0 flex w-screen items-center justify-center overflow-hidden 
  [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_0%,rgba(255,255,255,0)_85%)]">

      <svg
        class="absolute left-0 top-0 h-full w-full stroke-black/10 stroke-[2] 
    [mask-image:radial-gradient(circle_at_center,rgba(255,255,255,1)_20%,rgba(255,255,255,0)_95%)] dark:stroke-white/10">
        <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern)"></rect>
        <defs>
          <pattern id="grid-pattern" viewBox="0 0 64 64" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M64 0H0V64" fill="none"></path>
          </pattern>
        </defs>
      </svg>
    </div>

    <div
      class="relative w-[27rem] mx-5 flex flex-col justify-center py-8 px-4 md:px-8 bg-white dark:bg-gray-800 shadow-md rounded-xl">
      <div class="flex items-center justify-center">
        <button class="toggle-theme absolute left-2 top-2 flex-center p-1.5 rounded-full text-gray-300">
          <svg class="inline-block dark:hidden size-5">
            <use href="#moon" />
          </svg>
          <svg class="hidden dark:inline size-5">
            <use href="#sun" />
          </svg>
        </button>
        <a href="{%url 'products:index'%}" class="flex flex-col text-center">
          <span class="font-MorabbaMedium text-4xl flex items-center">
            <span class="text-blue-500">کارین</span> شاپ
          </span>
        </a>
      </div>
      <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
        <p class="mb-2 text-gray-800 dark:text-gray-100 font-DanaMedium text-lg">کد تایید را وارد کنید</p>
        <form id="otp-form" method="POST">



          <label for="email" class="block text-sm/6 font-medium text-gray-500 dark:text-gray-300">
            را وارد کنید {{to_phone}} برای تغییر شماره تلفن کد تایید ارسال شده به
          </label>

          <div dir="ltr" class="flex items-center justify-between gap-4 mt-5">
            {%csrf_token%}
            <input type="text" class="otp-input" name="code_unit_1" pattern="\d*" maxlength="1" />
            <input type="text" class="otp-input" name="code_unit_2" maxlength="1" />
            <input type="text" class="otp-input " name="code_unit_3" maxlength="1" />
            <input type="text" class="otp-input" name="code_unit_4" maxlength="1" />
            <input type="text" class="otp-input" name="code_unit_5" maxlength="1" />
          </div>
          <div class="w-full mx-auto mt-8">
            <button type="submit" class="submit-btn">
              ادامه
            </button>
          </div>
        </form>
        {%if remaining_time_text%}
        <p class="login-timer_text">
          مانده تا دریافت مجدد کد <span data-time="{{remaining_time}}"
            class="login-timer text-blue-500">{{remaining_time_text}}</span>
        </p>
        {%else%}
        <button class="resend-code active">
          دریافت مجدد کد
          <svg class="size-4 rotate-90">
            <use href="#chevron" />
          </svg>
        </button>
        {%endif%}
        <button class="resend-code active">
          دریافت مجدد کد
          <svg class="size-4 rotate-90">
            <use href="#chevron" />
          </svg>
        </button>
        {%if is_reg%}
        <a style="margin: 0px 37%;" href="{%url 'users:login_with_password'%}">ورود با رمز عبور</a>
        {%endif%}
      </div>
    </div>
  </section>
  <script>
    let timer = document.querySelector(".login-timer");
    if (timer) {
      let time = parseInt(timer.getAttribute("data-time"), 10);

      let interval = setInterval(() => {
        if (time > 0) {
          time -= 1;
          let minutes = Math.floor(time / 60);
          let seconds = Math.floor(time % 60);
          let text = `${minutes}:${seconds.toString().padStart(2, "0")}`;
          timer.innerHTML = text;
        } else {
          clearInterval(interval);
          let timerText = document.querySelector(".login-timer_text");
          if (timerText) timerText.style.display = "none";
          let resendBtn = document.querySelector(".resend-code");
          if (resendBtn) resendBtn.classList.add("active");
        }
      }, 1000);
    }
  </script>

{%if error%}

<script src="{%static 'js/app.js'%}"></script>
<script src="{%static 'js/sweetalert.js'%}"></script>
  <script>
    const isDarkMode = document.querySelector("html").classList.contains("dark")



    const alertOptions = {
      background: isDarkMode ? 'oklch(0.21 0.034 264.665)' : '#fff',
      color: isDarkMode ? 'oklch(0.985 0.002 247.839)' : 'oklch(0.13 0.028 261.692)',
      confirmButtonColor: isDarkMode ? 'oklch(0.488 0.243 264.376)' : 'oklch(0.623 0.214 259.815)',
      cancelButtonColor: isDarkMode ? '#f44336' : '#d33',
    };
    Swal.fire({
      title: "خطا!",
      text: "کد نامعتبر!",
      icon: 'error',
      confirmButtonText: 'باشه',
      showCancelButton: false,
      cancelButtonText: 'لغو',
      background: alertOptions.background,
      color: alertOptions.color,
      confirmButtonColor: alertOptions.confirmButtonColor,
      cancelButtonColor: alertOptions.cancelButtonColor
    });


  </script>

  {%endif%}




</body>


</html>
